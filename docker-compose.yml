  # ---------------------------------------------------------------------------
  # Next.js Client
  # ---------------------------------------------------------------------------
  rbat_client:
    build:
      context: ./rbat-client
      dockerfile: Dockerfile
    image: rbat-client:latest
    container_name: rbat-client
    environment:
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "3000:3000"
    networks:
      - proxy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');http.get('http://localhost:3000/',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
#    labels:
#      - "traefik.enable=true"
#      - "traefik.http.routers.rbat_client.rule=Host(`${DOMAIN}`)"
#      - "traefik.http.routers.rbat_client.entrypoints=websecure"
#      - "traefik.http.routers.rbat_client.tls.certresolver=letsencrypt"
#      - "traefik.http.routers.rbat_client.middlewares=secure-headers,rate-limit"
#      - "traefik.http.services.rbat_client.loadbalancer.server.port=3000"

  # ---------------------------------------------------------------------------
  # Storage Bucket (Minio)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: secure_storage_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - proxy
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Axum/Tonic Server (Rust API)
  # ---------------------------------------------------------------------------
  rbat_server:
    build:
      context: .
      dockerfile: rbat-server/Dockerfile
    image: rbat-server:latest
    container_name: rbat-server
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
    networks:
      - proxy
      - backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1024M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
#    labels:
#      - "traefik.enable=true"
#      - "traefik.http.routers.rbat_server.rule=Host(`api.${DOMAIN}`)"
#      - "traefik.http.routers.rbat_server.entrypoints=websecure"
#      - "traefik.http.routers.rbat_server.tls.certresolver=letsencrypt"
#      - "traefik.http.routers.rbat_server.middlewares=secure-headers,rate-limit"
#      - "traefik.http.services.rbat_server.loadbalancer.server.port=8080"

# =============================================================================
# Networks
# =============================================================================
networks:
  proxy:
    driver: bridge
  backend:
    driver: bridge
    internal: true   # no external access — only inter-service

# =============================================================================
# Volumes
# =============================================================================
volumes:
  minio_data:
#  letsencrypt:
