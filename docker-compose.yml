# =============================================================================
# RBAT — Production Docker Compose
# =============================================================================
# Prerequisites:
#   1. Copy .env.example to .env and fill in all required values.
#   2. Ensure DNS for ${DOMAIN} and api.${DOMAIN} points to this host.
#   3. Run:  docker compose up -d --build
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Reverse Proxy / Edge Router
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.6
    container_name: rbat_edge_router
    command:
      # Provider ----------------------------------------------------------
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--providers.docker.network=rbat_proxy"
      # Entrypoints -------------------------------------------------------
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # HTTP → HTTPS redirect
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # TLS / Let's Encrypt -----------------------------------------------
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # Health / Observability --------------------------------------------
      - "--ping=true"
      - "--log.level=WARN"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - proxy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3


  # ---------------------------------------------------------------------------
  # Next.js Client
  # ---------------------------------------------------------------------------
  rbat_client:
    build:
      context: .
      dockerfile: rbat-client/Dockerfile
    image: rbat-client:latest
    container_name: rbat-client
    environment:
      NODE_ENV: production
      PORT: "3000"
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      GRPC_SERVER_URL: rbat-server:8080
      WEBHOOK_RECEIVER_URL: http://rbat-server:8080/webhooks
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      REDIS_URL: redis://redis:6379
    # Ports are mapped internally and routed securely via Traefik
    # ports:
    #   - "3000:3000"
    networks:
      - proxy
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');http.get('http://localhost:3000/',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rbat_client.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.rbat_client.entrypoints=websecure"
      - "traefik.http.routers.rbat_client.tls.certresolver=letsencrypt"
      # Middlewares definition
      - "traefik.http.middlewares.client-secure-headers.headers.sslredirect=true"
      - "traefik.http.middlewares.client-secure-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.client-secure-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.client-secure-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.client-secure-headers.headers.framedeny=true"
      - "traefik.http.middlewares.client-secure-headers.headers.contenttypenosniff=true"
      - "traefik.http.middlewares.client-secure-headers.headers.browserxssfilter=true"
      - "traefik.http.middlewares.client-secure-headers.headers.referrerpolicy=same-origin"
      - "traefik.http.middlewares.client-secure-headers.headers.customresponseheaders.X-Robots-Tag=none,noarchive,nosnippet,notranslate,noimageindex"
      - "traefik.http.middlewares.client-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.client-ratelimit.ratelimit.burst=50"
      # Apply middlewares
      - "traefik.http.routers.rbat_client.middlewares=client-secure-headers,client-ratelimit"
      - "traefik.http.services.rbat_client.loadbalancer.server.port=3000"

  # ---------------------------------------------------------------------------
  # Storage Bucket (Minio)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: secure_storage_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    # Ports are not exposed to the public internet for security.
    # ports:
    #   - "127.0.0.1:9000:9000"
    #   - "127.0.0.1:9001:9001"
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Axum/Tonic Server (Rust API)
  # ---------------------------------------------------------------------------
  rbat_server:
    build:
      context: .
      dockerfile: rbat-server/Dockerfile
    image: rbat-server:latest
    container_name: rbat-server
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
      WEBHOOK_TARGET_URL: http://rbat-client:3000/api/webhook
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      RUN_MODE: production
    networks:
      - proxy
      - backend
    restart: unless-stopped
    # Ports are mapped internally and routed securely via Traefik
    # ports:
    #   - "8080:8080"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1024M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rbat_server.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.rbat_server.entrypoints=websecure"
      - "traefik.http.routers.rbat_server.tls.certresolver=letsencrypt"
      # Middlewares definition
      - "traefik.http.middlewares.server-secure-headers.headers.sslredirect=true"
      - "traefik.http.middlewares.server-secure-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.server-secure-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.server-secure-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.server-secure-headers.headers.framedeny=true"
      - "traefik.http.middlewares.server-secure-headers.headers.contenttypenosniff=true"
      - "traefik.http.middlewares.server-secure-headers.headers.browserxssfilter=true"
      - "traefik.http.middlewares.server-secure-headers.headers.referrerpolicy=same-origin"
      - "traefik.http.middlewares.server-secure-headers.headers.customresponseheaders.X-Robots-Tag=none,noarchive,nosnippet,notranslate,noimageindex"
      - "traefik.http.middlewares.server-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.server-ratelimit.ratelimit.burst=50"
      # Apply middlewares
      - "traefik.http.routers.rbat_server.middlewares=server-secure-headers,server-ratelimit"
      - "traefik.http.services.rbat_server.loadbalancer.server.port=8080"

  # ---------------------------------------------------------------------------
  # Redis Event Broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: rbat_redis
    # Ports are not exposed to the public internet for security.
    # ports:
    #   - "127.0.0.1:6379:6379"
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# =============================================================================
# Networks
# =============================================================================
networks:
  proxy:
    driver: bridge
  backend:
    driver: bridge
    internal: true   # no external access — only inter-service

# =============================================================================
# Volumes
# =============================================================================
volumes:
  minio_data:
  letsencrypt:
