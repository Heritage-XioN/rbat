name: Test RELEASE_PAT Access

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test-pat:
    name: Test Token
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Verify Secret Presence
        run: |
          if [ -n "${{ secrets.RELEASE_PAT }}" ]; then
            echo "✓ SUCCESS: RELEASE_PAT is configured and accessible to this job!"
            echo "The first 3 characters of the token masked (checking length):"
            # Show a masked indicator or verify length
            TOKEN_LEN=$(echo -n "${{ secrets.RELEASE_PAT }}" | wc -m)
            echo "Token length is: $TOKEN_LEN characters."
          else
            echo "⚠️ ERROR: RELEASE_PAT is empty or not configured in your repository secrets."
            exit 1
          fi
